<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected — Jazzmyne Miller</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white:  #F5F5F0;
  --gold:   #FCA311;
  --navy:   #14213D;
  --muted:  #6B6B76;
  --rule:   rgba(0,0,0,0.08);
}
body { font-family: 'Instrument Sans', sans-serif; background: var(--white); color: var(--navy); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
.serif { font-family: 'Playfair Display', serif; }

nav { background: var(--navy); padding: 1.25rem 3.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(252,163,17,0.3); }
.nav-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--white); text-decoration: none; }
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a { font-size: 0.82rem; color: rgba(245,245,240,0.65); text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s; }
.nav-links a:hover { color: var(--gold); }

main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 2rem; }

.gate-wrap { max-width: 440px; width: 100%; text-align: center; }

.gate-icon { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; }
.gate-rule { height: 1px; width: 40px; background: var(--gold); opacity: 0.5; }
.gate-lock { width: 32px; height: 32px; }

.gate-eyebrow { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
.gate-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--navy); letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 0.75rem; }
.gate-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.75; margin-bottom: 2rem; }

.gate-input { width: 100%; padding: 0.85rem 1rem; border: 1px solid rgba(0,0,0,0.15); background: #fff; font-family: 'Instrument Sans', sans-serif; font-size: 0.85rem; color: var(--navy); text-align: center; outline: none; margin-bottom: 0.75rem; transition: border-color 0.2s; }
.gate-input:focus { border-color: var(--gold); }
.gate-input::placeholder { color: rgba(0,0,0,0.3); }

.gate-btn { width: 100%; padding: 0.9rem; background: var(--gold); color: var(--navy); font-family: 'Instrument Sans', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border: none; cursor: pointer; transition: background 0.2s; }
.gate-btn:hover { background: #e8940f; }

.gate-error { font-size: 0.78rem; color: #c0392b; margin-top: 0.75rem; display: none; }
.gate-error.visible { display: block; }

.gate-contact { font-size: 0.78rem; color: var(--muted); margin-top: 1.25rem; }
.gate-contact a { color: var(--navy); font-weight: 600; text-decoration: none; }
.gate-contact a:hover { color: var(--gold); }

footer { background: var(--navy); padding: 1.5rem 3.5rem; display: flex; justify-content: space-between; align-items: center; }
.footer-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); }
.footer-copy { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(245,245,240,0.3); }

@media (max-width: 768px) {
  nav { padding: 1rem 1.5rem; }
  .nav-links { display: none; }
  footer { flex-direction: column; gap: 0.75rem; text-align: center; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-name serif">Jazzmyne Miller</a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="work.html">Work</a></li>
    <li><a href="resume.html">Resume</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<main>
  <div class="gate-wrap">

    <div class="gate-icon">
      <div class="gate-rule"></div>
      <svg class="gate-lock" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="11" width="18" height="11" rx="2" fill="#FCA311"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#FCA311" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="16" r="1.5" fill="#14213D"/>
      </svg>
      <div class="gate-rule"></div>
    </div>

    <div class="gate-eyebrow">Protected Case Study</div>
    <h1 class="gate-title serif" id="gate-title">Case Study</h1>
    <p class="gate-desc">This case study contains confidential research. Please enter the password to view the full study.</p>

    <input type="password" class="gate-input" id="gate-input" placeholder="Enter password" />
    <button class="gate-btn" onclick="checkPassword()">View Case Study</button>
    <div class="gate-error" id="gate-error">Incorrect password. Please try again.</div>

    <p class="gate-contact">Need access? <a href="contact.html">Get in touch</a></p>

  </div>
</main>

<footer>
  <div class="footer-name serif">Jazzmyne Miller</div>
  <div class="footer-copy">© 2026</div>
</footer>

<script>
  const PASSWORD = 'indigovault14';

  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect') || 'work.html';
  document.getElementById('gate-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  function checkPassword() {
    const val = document.getElementById('gate-input').value;
    const err = document.getElementById('gate-error');
    if (val === PASSWORD) {
      window.location.href = redirect;
    } else {
      err.classList.add('visible');
      document.getElementById('gate-input').value = '';
      document.getElementById('gate-input').focus();
    }
  }
</script>

</body>
</html>
